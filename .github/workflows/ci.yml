name: CI
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install linters & pytest
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Ruff lint
        run: ruff check src || (echo "Ruff found issues"; exit 1)
      - name: Run pytest if tests exist
        run: |
          if compgen -G "tests/test_*.py" > /dev/null; then pytest -q; else echo "No tests"; fi
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Spark apps image
        uses: docker/build-push-action@v6
        with:
          context: ./src/streaming
          file: ./src/streaming/Dockerfile
          tags: |
            bitcoin/spark-apps:latest
            bitcoin/spark-apps:${{ github.sha }}
          push: false
      - name: Build Producer image
        uses: docker/build-push-action@v6
        with:
          context: ./src/producer
          file: ./src/producer/Dockerfile
          tags: |
            bitcoin/producer:latest
            bitcoin/producer:${{ github.sha }}
          push: false
      - name: Build Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./src/dashboard
          file: ./src/dashboard/Dockerfile
          tags: |
            bitcoin/dashboard:latest
            bitcoin/dashboard:${{ github.sha }}
          push: false
      - name: Prepare env file for compose validation
        run: cp .env.example .env
      - name: Compose config validation (Base)
        run: docker compose --env-file .env config
      - name: Compose config validation (Dev)
        run: docker compose --env-file .env -f docker-compose.yml -f docker-compose.dev.yml config


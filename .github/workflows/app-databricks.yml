name: app-databricks-cloud

on:
  pull_request:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "databricks.yml"
      - "requirements-ci.txt"
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - ".github/workflows/app-databricks.yml"

  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "databricks.yml"
      - "requirements-ci.txt"
      - "docker-compose.yml"
      - "docker-compose.dev.yml"
      - ".github/workflows/app-databricks.yml"

  workflow_dispatch:
    inputs:
      target_env:
        description: "Cloud environment to deploy Databricks bundle (local is on-prem and not deployed here)"
        required: true
        default: "stage"
        type: choice
        options:
          - dev
          - stage
          - prod

permissions:
  contents: read

jobs:
  quality-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint and test tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Ruff lint
        run: ruff check src

      - name: Run pytest
        run: pytest -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Spark image
        uses: docker/build-push-action@v6
        with:
          context: ./src/streaming
          file: ./src/streaming/Dockerfile
          tags: bitcoin/spark-apps:${{ github.sha }}
          push: false

      - name: Build Producer image
        uses: docker/build-push-action@v6
        with:
          context: ./src/producer
          file: ./src/producer/Dockerfile
          tags: bitcoin/producer:${{ github.sha }}
          push: false

      - name: Build Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./src/dashboard
          file: ./src/dashboard/Dockerfile
          tags: bitcoin/dashboard:${{ github.sha }}
          push: false

      - name: Validate compose files
        run: |
          cp .env.example .env
          docker compose --env-file .env config
          docker compose --env-file .env -f docker-compose.yml -f docker-compose.dev.yml config

  bundle-validate:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
    needs: quality-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Databricks credentials
        id: creds
        shell: bash
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [[ -n "$DATABRICKS_HOST" && -n "$DATABRICKS_TOKEN" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: databricks/setup-cli@main
        if: steps.creds.outputs.available == 'true'

      - name: Validate Databricks bundle
        if: steps.creds.outputs.available == 'true'
        shell: bash
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          EVENT_HUBS_BOOTSTRAP: ${{ vars.EVENT_HUBS_BOOTSTRAP }}
          EVENT_HUBS_TOPIC: ${{ vars.EVENT_HUBS_TOPIC }}
          DELTA_BASE_PATH: ${{ vars.DELTA_BASE_PATH }}
          CHECKPOINT_BASE_PATH: ${{ vars.CHECKPOINT_BASE_PATH }}
          KAFKA_SECURITY_PROTOCOL: ${{ vars.KAFKA_SECURITY_PROTOCOL }}
          KAFKA_SASL_MECHANISM: ${{ vars.KAFKA_SASL_MECHANISM }}
          KAFKA_SASL_USERNAME: ${{ vars.KAFKA_SASL_USERNAME }}
          KAFKA_SASL_PASSWORD: ${{ secrets.KAFKA_SASL_PASSWORD }}
          KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ${{ vars.KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM }}
          KAFKA_STARTING_OFFSETS: ${{ vars.KAFKA_STARTING_OFFSETS }}
          KAFKA_FAIL_ON_DATA_LOSS: ${{ vars.KAFKA_FAIL_ON_DATA_LOSS }}
        run: |
          databricks bundle validate -t dev \
            --var="databricks_host=${DATABRICKS_HOST}" \
            --var="event_hubs_bootstrap=${EVENT_HUBS_BOOTSTRAP:-my-namespace.servicebus.windows.net:9093}" \
            --var="event_hubs_topic=${EVENT_HUBS_TOPIC:-bitcoin-stream}" \
            --var="delta_base_path=${DELTA_BASE_PATH:-abfss://delta@mydatalake.dfs.core.windows.net/bitcoin}" \
            --var="checkpoint_base_path=${CHECKPOINT_BASE_PATH:-abfss://checkpoints@mydatalake.dfs.core.windows.net/bitcoin}" \
            --var="kafka_security_protocol=${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}" \
            --var="kafka_sasl_mechanism=${KAFKA_SASL_MECHANISM:-PLAIN}" \
            --var="kafka_sasl_username=${KAFKA_SASL_USERNAME:-\$ConnectionString}" \
            --var="kafka_sasl_password=${KAFKA_SASL_PASSWORD:-}" \
            --var="kafka_ssl_endpoint_identification_algorithm=${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-https}" \
            --var="kafka_starting_offsets=${KAFKA_STARTING_OFFSETS:-latest}" \
            --var="kafka_fail_on_data_loss=${KAFKA_FAIL_ON_DATA_LOSS:-false}"

      - name: Skip bundle validation when Databricks secrets are unavailable
        if: steps.creds.outputs.available != 'true'
        run: |
          echo "Skipping Databricks bundle validation because DATABRICKS_HOST or DATABRICKS_TOKEN is not set."

  deploy-cloud-dev:
    if: github.event_name == 'push'
    needs: quality-build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Check Databricks credentials
        id: creds
        shell: bash
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [[ -n "$DATABRICKS_HOST" && -n "$DATABRICKS_TOKEN" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Databricks runtime configuration
        id: runtime
        shell: bash
        env:
          EVENT_HUBS_BOOTSTRAP: ${{ vars.EVENT_HUBS_BOOTSTRAP }}
          DELTA_BASE_PATH: ${{ vars.DELTA_BASE_PATH }}
          CHECKPOINT_BASE_PATH: ${{ vars.CHECKPOINT_BASE_PATH }}
          KAFKA_SASL_PASSWORD: ${{ secrets.KAFKA_SASL_PASSWORD }}
        run: |
          missing=()
          [[ -n "$EVENT_HUBS_BOOTSTRAP" ]] || missing+=("EVENT_HUBS_BOOTSTRAP")
          [[ -n "$DELTA_BASE_PATH" ]] || missing+=("DELTA_BASE_PATH")
          [[ -n "$CHECKPOINT_BASE_PATH" ]] || missing+=("CHECKPOINT_BASE_PATH")
          [[ -n "$KAFKA_SASL_PASSWORD" ]] || missing+=("KAFKA_SASL_PASSWORD")

          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
          fi

      - uses: databricks/setup-cli@main
        if: steps.creds.outputs.available == 'true' && steps.runtime.outputs.available == 'true'

      - name: Deploy bundle to dev
        if: steps.creds.outputs.available == 'true' && steps.runtime.outputs.available == 'true'
        shell: bash
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          EVENT_HUBS_BOOTSTRAP: ${{ vars.EVENT_HUBS_BOOTSTRAP }}
          EVENT_HUBS_TOPIC: ${{ vars.EVENT_HUBS_TOPIC }}
          DELTA_BASE_PATH: ${{ vars.DELTA_BASE_PATH }}
          CHECKPOINT_BASE_PATH: ${{ vars.CHECKPOINT_BASE_PATH }}
          KAFKA_SECURITY_PROTOCOL: ${{ vars.KAFKA_SECURITY_PROTOCOL }}
          KAFKA_SASL_MECHANISM: ${{ vars.KAFKA_SASL_MECHANISM }}
          KAFKA_SASL_USERNAME: ${{ vars.KAFKA_SASL_USERNAME }}
          KAFKA_SASL_PASSWORD: ${{ secrets.KAFKA_SASL_PASSWORD }}
          KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ${{ vars.KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM }}
          KAFKA_STARTING_OFFSETS: ${{ vars.KAFKA_STARTING_OFFSETS }}
          KAFKA_FAIL_ON_DATA_LOSS: ${{ vars.KAFKA_FAIL_ON_DATA_LOSS }}
        run: |
          databricks bundle deploy -t dev \
            --var="databricks_host=${DATABRICKS_HOST}" \
            --var="event_hubs_bootstrap=${EVENT_HUBS_BOOTSTRAP}" \
            --var="event_hubs_topic=${EVENT_HUBS_TOPIC:-bitcoin-stream}" \
            --var="delta_base_path=${DELTA_BASE_PATH}" \
            --var="checkpoint_base_path=${CHECKPOINT_BASE_PATH}" \
            --var="kafka_security_protocol=${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}" \
            --var="kafka_sasl_mechanism=${KAFKA_SASL_MECHANISM:-PLAIN}" \
            --var="kafka_sasl_username=${KAFKA_SASL_USERNAME:-\$ConnectionString}" \
            --var="kafka_sasl_password=${KAFKA_SASL_PASSWORD}" \
            --var="kafka_ssl_endpoint_identification_algorithm=${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-https}" \
            --var="kafka_starting_offsets=${KAFKA_STARTING_OFFSETS:-latest}" \
            --var="kafka_fail_on_data_loss=${KAFKA_FAIL_ON_DATA_LOSS:-false}"

      - name: Skip Databricks deploy when credentials are unavailable
        if: steps.creds.outputs.available != 'true'
        run: |
          echo "Skipping Databricks deploy because DATABRICKS_HOST or DATABRICKS_TOKEN is not set."

      - name: Skip Databricks deploy when runtime config is unavailable
        if: steps.creds.outputs.available == 'true' && steps.runtime.outputs.available != 'true'
        run: |
          echo "Skipping Databricks deploy because runtime inputs are missing: ${{ steps.runtime.outputs.missing }}"

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    needs: quality-build
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Databricks credentials
        id: creds
        shell: bash
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          if [[ -n "$DATABRICKS_HOST" && -n "$DATABRICKS_TOKEN" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Databricks runtime configuration
        id: runtime
        shell: bash
        env:
          EVENT_HUBS_BOOTSTRAP: ${{ vars.EVENT_HUBS_BOOTSTRAP }}
          DELTA_BASE_PATH: ${{ vars.DELTA_BASE_PATH }}
          CHECKPOINT_BASE_PATH: ${{ vars.CHECKPOINT_BASE_PATH }}
          KAFKA_SASL_PASSWORD: ${{ secrets.KAFKA_SASL_PASSWORD }}
        run: |
          missing=()
          [[ -n "$EVENT_HUBS_BOOTSTRAP" ]] || missing+=("EVENT_HUBS_BOOTSTRAP")
          [[ -n "$DELTA_BASE_PATH" ]] || missing+=("DELTA_BASE_PATH")
          [[ -n "$CHECKPOINT_BASE_PATH" ]] || missing+=("CHECKPOINT_BASE_PATH")
          [[ -n "$KAFKA_SASL_PASSWORD" ]] || missing+=("KAFKA_SASL_PASSWORD")

          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
          fi

      - uses: databricks/setup-cli@main
        if: steps.creds.outputs.available == 'true' && steps.runtime.outputs.available == 'true'

      - name: Deploy bundle to selected environment
        if: steps.creds.outputs.available == 'true' && steps.runtime.outputs.available == 'true'
        shell: bash
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          EVENT_HUBS_BOOTSTRAP: ${{ vars.EVENT_HUBS_BOOTSTRAP }}
          EVENT_HUBS_TOPIC: ${{ vars.EVENT_HUBS_TOPIC }}
          DELTA_BASE_PATH: ${{ vars.DELTA_BASE_PATH }}
          CHECKPOINT_BASE_PATH: ${{ vars.CHECKPOINT_BASE_PATH }}
          KAFKA_SECURITY_PROTOCOL: ${{ vars.KAFKA_SECURITY_PROTOCOL }}
          KAFKA_SASL_MECHANISM: ${{ vars.KAFKA_SASL_MECHANISM }}
          KAFKA_SASL_USERNAME: ${{ vars.KAFKA_SASL_USERNAME }}
          KAFKA_SASL_PASSWORD: ${{ secrets.KAFKA_SASL_PASSWORD }}
          KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ${{ vars.KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM }}
          KAFKA_STARTING_OFFSETS: ${{ vars.KAFKA_STARTING_OFFSETS }}
          KAFKA_FAIL_ON_DATA_LOSS: ${{ vars.KAFKA_FAIL_ON_DATA_LOSS }}
        run: |
          databricks bundle deploy -t ${{ inputs.target_env }} \
            --var="databricks_host=${DATABRICKS_HOST}" \
            --var="event_hubs_bootstrap=${EVENT_HUBS_BOOTSTRAP}" \
            --var="event_hubs_topic=${EVENT_HUBS_TOPIC:-bitcoin-stream}" \
            --var="delta_base_path=${DELTA_BASE_PATH}" \
            --var="checkpoint_base_path=${CHECKPOINT_BASE_PATH}" \
            --var="kafka_security_protocol=${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}" \
            --var="kafka_sasl_mechanism=${KAFKA_SASL_MECHANISM:-PLAIN}" \
            --var="kafka_sasl_username=${KAFKA_SASL_USERNAME:-\$ConnectionString}" \
            --var="kafka_sasl_password=${KAFKA_SASL_PASSWORD}" \
            --var="kafka_ssl_endpoint_identification_algorithm=${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-https}" \
            --var="kafka_starting_offsets=${KAFKA_STARTING_OFFSETS:-latest}" \
            --var="kafka_fail_on_data_loss=${KAFKA_FAIL_ON_DATA_LOSS:-false}"

      - name: Skip Databricks deploy when credentials are unavailable
        if: steps.creds.outputs.available != 'true'
        run: |
          echo "Skipping Databricks deploy because DATABRICKS_HOST or DATABRICKS_TOKEN is not set."

      - name: Skip Databricks deploy when runtime config is unavailable
        if: steps.creds.outputs.available == 'true' && steps.runtime.outputs.available != 'true'
        run: |
          echo "Skipping Databricks deploy because runtime inputs are missing: ${{ steps.runtime.outputs.missing }}"

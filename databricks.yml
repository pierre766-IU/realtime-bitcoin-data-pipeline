bundle:
  name: bitcoin-streaming-pipeline

sync:
  include:
    - src/**
  exclude:
    - notebooks/**

variables:
  event_hubs_bootstrap:
    description: Event Hubs Kafka bootstrap endpoint <namespace>.servicebus.windows.net:9093
    default: my-namespace.servicebus.windows.net:9093
  event_hubs_topic:
    description: Event Hubs topic (hub) name
    default: bitcoin-stream
  kafka_security_protocol:
    description: Kafka security protocol used by the bronze job
    default: SASL_SSL
  kafka_sasl_mechanism:
    description: Kafka SASL mechanism used by the bronze job
    default: PLAIN
  kafka_sasl_username:
    description: Kafka SASL username used by the bronze job
    default: "$ConnectionString"
  kafka_sasl_password:
    description: Kafka SASL password or connection string used by the bronze job
    default: ""
  kafka_ssl_endpoint_identification_algorithm:
    description: SSL endpoint identification algorithm for Kafka clients
    default: https
  kafka_starting_offsets:
    description: Starting offsets for the bronze stream
    default: latest
  kafka_fail_on_data_loss:
    description: Whether the bronze stream should fail when Kafka data is missing
    default: "false"
  delta_base_path:
    description: ADLS path for Delta tables
    default: abfss://delta@mydatalake.dfs.core.windows.net/bitcoin
  checkpoint_base_path:
    description: ADLS path for Structured Streaming checkpoints
    default: abfss://checkpoints@mydatalake.dfs.core.windows.net/bitcoin
  storage_account_name:
    description: ADLS storage account name used by the streaming jobs
    default: mydatalake
  storage_account_key:
    description: ADLS storage account shared key used by the streaming jobs
    default: ""
  spark_version:
    description: Databricks runtime
    default: 13.3.x-scala2.12
  node_type_id:
    description: Databricks worker node size
    default: Standard_D4ds_v4
  num_workers:
    description: Number of workers for each streaming job cluster
    default: "1"

resources:
  jobs:
    bronze_stream:
      name: btc-bronze-${bundle.target}
      max_concurrent_runs: 1
      tasks:
        - task_key: bronze_task
          spark_python_task:
            python_file: src/streaming/bronze_ingest.py
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: ${var.num_workers}
            spark_env_vars:
              BOOTSTRAP: ${var.event_hubs_bootstrap}
              TOPIC: ${var.event_hubs_topic}
              KAFKA_SECURITY_PROTOCOL: ${var.kafka_security_protocol}
              KAFKA_SASL_MECHANISM: ${var.kafka_sasl_mechanism}
              KAFKA_SASL_USERNAME: ${var.kafka_sasl_username}
              KAFKA_SASL_PASSWORD: ${var.kafka_sasl_password}
              KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ${var.kafka_ssl_endpoint_identification_algorithm}
              KAFKA_STARTING_OFFSETS: ${var.kafka_starting_offsets}
              KAFKA_FAIL_ON_DATA_LOSS: ${var.kafka_fail_on_data_loss}
              DELTA_BASE_PATH: ${var.delta_base_path}
              CHECKPOINT_BASE_PATH: ${var.checkpoint_base_path}
              STORAGE_ACCOUNT_NAME: ${var.storage_account_name}
              STORAGE_ACCOUNT_KEY: ${var.storage_account_key}
      tags:
        layer: bronze
        system: bitcoin-streaming-pipeline

    silver_stream:
      name: btc-silver-${bundle.target}
      max_concurrent_runs: 1
      tasks:
        - task_key: silver_task
          spark_python_task:
            python_file: src/streaming/silver_transform.py
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: ${var.num_workers}
            spark_env_vars:
              DELTA_BASE_PATH: ${var.delta_base_path}
              CHECKPOINT_BASE_PATH: ${var.checkpoint_base_path}
              STORAGE_ACCOUNT_NAME: ${var.storage_account_name}
              STORAGE_ACCOUNT_KEY: ${var.storage_account_key}
      tags:
        layer: silver
        system: bitcoin-streaming-pipeline

    gold_stream:
      name: btc-gold-${bundle.target}
      max_concurrent_runs: 1
      tasks:
        - task_key: gold_task
          spark_python_task:
            python_file: src/streaming/gold_agg.py
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: ${var.num_workers}
            spark_env_vars:
              DELTA_BASE_PATH: ${var.delta_base_path}
              CHECKPOINT_BASE_PATH: ${var.checkpoint_base_path}
              STORAGE_ACCOUNT_NAME: ${var.storage_account_name}
              STORAGE_ACCOUNT_KEY: ${var.storage_account_key}
      tags:
        layer: gold
        system: bitcoin-streaming-pipeline

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: dev
      root_path: ~/.bundle/${bundle.name}/${bundle.target}
    variables:
      node_type_id: Standard_D2ads_v6
      num_workers: "1"

  stage:
    mode: production
    workspace:
      profile: stage
      root_path: /Workspace/Shared/${bundle.name}/${bundle.target}
    variables:
      node_type_id: Standard_D8ds_v4
      num_workers: "2"

  prod:
    mode: production
    workspace:
      profile: prod
      root_path: /Workspace/Shared/${bundle.name}/${bundle.target}
    variables:
      node_type_id: Standard_D8ds_v4
      num_workers: "3"

